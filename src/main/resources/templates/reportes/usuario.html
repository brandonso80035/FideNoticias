<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reporte Usuario - FideNoticias</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a3a6b; color: white; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; }
        nav .logo { font-size: 1.5rem; font-weight: bold; padding: 1rem 0; }
        nav a { color: #cce0ff; text-decoration: none; padding: 1rem 0.5rem; display: inline-block; }
        main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1rem; }
        .card h2 { color: #1a3a6b; margin-bottom: 1rem; border-bottom: 2px solid #4da6ff; padding-bottom: 0.5rem; }
        .stat { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #1a3a6b; }
        .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block; margin-top: 1rem; }
        .btn-primary { background: #1a3a6b; color: white; }
        footer { text-align: center; padding: 1.5rem; color: #888; font-size: 0.85rem; margin-top: 2rem; }
    </style>
</head>
<body>
<nav>
    <span class="logo">📰 FideNoticias</span>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/noticias/tema/0}">Noticias</a>
    <a th:href="@{/rankings}">Rankings</a>
    <a th:href="@{/usuarios}">Usuarios</a>
</nav>
<main>
    <div class="card">
        <h2>📊 Reporte de Usuario #<span th:text="${idUsuario}"></span></h2>
        <div class="stat">
            <span>👁 Total de Visitas</span>
            <span class="stat-value" th:text="${reporte['P_VISITAS'] ?: 0}"></span>
        </div>
        <div class="stat">
            <span>⭐ Calificaciones realizadas</span>
            <span class="stat-value" th:text="${reporte['P_CALIFICACIONES'] ?: 0}"></span>
        </div>
        <div class="stat">
            <span>💬 Comentarios escritos</span>
            <span class="stat-value" th:text="${reporte['P_COMENTARIOS'] ?: 0}"></span>
        </div>
        <a th:href="@{/usuarios}" class="btn btn-primary">← Volver a Usuarios</a>
    </div>
</main>
<footer>FideNoticias © 2026 · Universidad Fidélitas · SC-504</footer>
</body>
</html>
