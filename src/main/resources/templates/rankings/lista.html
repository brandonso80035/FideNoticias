<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Ranking - FideNoticias</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a3a6b; color: white; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; }
        nav .logo { font-size: 1.5rem; font-weight: bold; padding: 1rem 0; }
        nav a { color: #cce0ff; text-decoration: none; padding: 1rem 0.5rem; display: inline-block; }
        main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 1.5rem; }
        .card h2 { color: #1a3a6b; margin-bottom: 1rem; border-bottom: 2px solid #4da6ff; padding-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a3a6b; color: white; padding: 0.75rem; text-align: left; }
        td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f0f7ff; }
        .btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; text-decoration: none; display: inline-block; }
        .btn-primary { background: #1a3a6b; color: white; }
        .stars { color: #f5c518; }
        .medal-1 { color: #FFD700; font-size: 1.2rem; }
        .medal-2 { color: #C0C0C0; font-size: 1.2rem; }
        .medal-3 { color: #CD7F32; font-size: 1.2rem; }
        footer { text-align: center; padding: 1.5rem; color: #888; font-size: 0.85rem; margin-top: 2rem; }
    </style>
</head>
<body>
<nav>
    <span class="logo">📰 FideNoticias</span>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/noticias/tema/0}">Noticias</a>
    <a th:href="@{/rankings}">Rankings</a>
    <a th:href="@{/usuarios}">Usuarios</a>
</nav>
<main>
    <div class="card">
        <h2>🏆 Ranking: <span th:text="${tipo}"></span>
            <a th:href="@{/rankings}" class="btn btn-primary" style="float:right;">← Volver</a>
        </h2>
        <p th:if="${noticias == null or noticias.empty}" style="color:#888; margin-top:1rem;">
            No hay datos disponibles.
        </p>
        <table th:if="${noticias != null and !noticias.empty}">
            <thead>
                <tr>
                    <th>Pos.</th>
                    <th>Título</th>
                    <th>Tema</th>
                    <th>Vistas</th>
                    <th>Calificación</th>
                    <th>Portada</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="noticia, iter : ${noticias}">
                    <td>
                        <span th:if="${iter.index == 0}" class="medal-1">🥇</span>
                        <span th:if="${iter.index == 1}" class="medal-2">🥈</span>
                        <span th:if="${iter.index == 2}" class="medal-3">🥉</span>
                        <span th:if="${iter.index > 2}"  th:text="${iter.index + 1}"></span>
                    </td>
                    <td th:text="${noticia.titulo}"></td>
                    <td th:text="${noticia.nombreTema ?: '-'}"></td>
                    <td th:text="${noticia.vistas}"></td>
                    <td>
                        <span class="stars" th:if="${noticia.promedioCalificacion != null and noticia.promedioCalificacion > 0}">
                            ★ <span th:text="${#numbers.formatDecimal(noticia.promedioCalificacion,1,1)}"></span>
                        </span>
                        <span th:unless="${noticia.promedioCalificacion != null and noticia.promedioCalificacion > 0}">-</span>
                    </td>
                    <td>
                        <span th:if="${noticia.portada}"   style="color:green;">✔ Sí</span>
                        <span th:unless="${noticia.portada}" style="color:#aaa;">No</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer>FideNoticias © 2026 · Universidad Fidélitas · SC-504</footer>
</body>
</html>
