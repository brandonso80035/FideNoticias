<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FideNoticias - Inicio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a3a6b; color: white; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; }
        nav .logo { font-size: 1.5rem; font-weight: bold; padding: 1rem 0; }
        nav a { color: #cce0ff; text-decoration: none; padding: 1rem 0.5rem; display: inline-block; }
        nav a:hover { color: white; border-bottom: 2px solid #4da6ff; }
        main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { color: #1a3a6b; margin-bottom: 1rem; border-bottom: 2px solid #4da6ff; padding-bottom: 0.5rem; }
        .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block; }
        .btn-primary { background: #1a3a6b; color: white; }
        .btn-primary:hover { background: #2a5abb; }
        .btn-success { background: #28a745; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1rem; }
        footer { text-align: center; padding: 1.5rem; color: #888; font-size: 0.85rem; margin-top: 2rem; }
    </style>
</head>
<body>
<nav>
    <span class="logo">📰 FideNoticias</span>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/noticias/tema/0}">Noticias</a>
    <a th:href="@{/rankings}">Rankings</a>
    <a th:href="@{/usuarios}">Usuarios</a>
</nav>
<main>
    <div class="card">
        <h2>Bienvenido a FideNoticias</h2>
        <p style="margin-bottom:1.5rem; color:#555;">
            Portal digital de noticias de la Universidad Fidélitas.
        </p>
        <div class="grid">
            <a th:href="@{/noticias/tema/0}" class="btn btn-primary" style="text-align:center; padding:1.5rem;">📰 Ver Noticias</a>
            <a th:href="@{/rankings}"        class="btn btn-primary" style="text-align:center; padding:1.5rem;">🏆 Rankings</a>
            <a th:href="@{/usuarios}"        class="btn btn-primary" style="text-align:center; padding:1.5rem;">👤 Usuarios</a>
            <a th:href="@{/usuarios/nuevo}"  class="btn btn-success" style="text-align:center; padding:1.5rem;">➕ Nuevo Usuario</a>
        </div>
    </div>
</main>
<footer>FideNoticias © 2026 · Universidad Fidélitas · SC-504</footer>
</body>
</html>
