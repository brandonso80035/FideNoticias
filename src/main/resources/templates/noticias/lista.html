<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Noticias - FideNoticias</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        nav {
            background: #1a3a6b;
            color: white;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem 0;
        }
        
        nav a {
            color: #cce0ff;
            text-decoration: none;
            padding: 1rem 0.5rem;
            display: inline-block;
        }
        
        nav a:hover {
            color: white;
            border-bottom: 2px solid #4da6ff;
        }
        
        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .nav-user {
            color: #ffffff;
            font-size: 0.95rem;
        }
        
        .logout-form {
            display: inline;
            margin: 0;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.45rem 0.8rem;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #b52a37;
        }
        
        main {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .card h2 {
            color: #1a3a6b;
            margin-bottom: 1rem;
            border-bottom: 2px solid #4da6ff;
            padding-bottom: 0.5rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #1a3a6b;
            color: white;
            padding: 0.75rem;
            text-align: left;
        }
        
        td {
            padding: 0.65rem 0.75rem;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        
        tr:hover td {
            background: #f0f7ff;
        }
        
        .btn {
            padding: 0.35rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #1a3a6b;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .stars {
            color: #f5c518;
        }
        
        .acciones {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        
        .acciones form {
            display: inline;
            margin: 0;
        }
        
        .acciones select {
            padding: 0.3rem;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            color: #888;
            font-size: 0.85rem;
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <nav>
        <span class="logo">📰 FideNoticias</span>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/noticias/tema/0}">Noticias</a>
        <a th:href="@{/rankings}">Rankings</a>
        <a th:href="@{/usuarios}">Usuarios</a>

        <div class="nav-right">
            <div th:if="${session.usuarioLogueado != null}">
                <span class="nav-user">
                Bienvenido, <strong th:text="${session.usuarioLogueado.nombre}"></strong>
            </span>
            </div>

            <div th:if="${session.usuarioLogueado == null}">
                <a th:href="@{/login}">Login</a>
                <a th:href="@{/registro}">Registrarse</a>
            </div>

            <div th:if="${session.usuarioLogueado != null}">
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <button type="submit" class="logout-btn">Salir</button>
                </form>
            </div>
        </div>
    </nav>

    <main>
        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <h2>📰 Últimas Noticias</h2>

            <p th:if="${noticias == null or noticias.empty}" style="color:#888;">
                No hay noticias disponibles.
            </p>

            <table th:if="${noticias != null and !noticias.empty}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Título</th>
                        <th>Tema</th>
                        <th>Fecha</th>
                        <th>Vistas</th>
                        <th>Calificación</th>
                        <th>Portada</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="noticia, iter : ${noticias}">
                        <td th:text="${iter.index + 1}"></td>
                        <td th:text="${noticia.titulo}"></td>
                        <td th:text="${noticia.nombreTema != null ? noticia.nombreTema : '-'}"></td>
                        <td th:text="${noticia.fechaPublicacion != null ? noticia.fechaPublicacion.toLocalDate() : '-'}"></td>
                        <td th:text="${noticia.vistas}"></td>
                        <td>
                            <span class="stars" th:if="${noticia.promedioCalificacion != null and noticia.promedioCalificacion > 0}">
                            ★ <span th:text="${#numbers.formatDecimal(noticia.promedioCalificacion,1,1)}"></span>
                            </span>
                            <span th:unless="${noticia.promedioCalificacion != null and noticia.promedioCalificacion > 0}">-</span>
                        </td>
                        <td>
                            <span th:if="${noticia.portada}" style="color:green;">✔ Sí</span>
                            <span th:unless="${noticia.portada}" style="color:#aaa;">No</span>
                        </td>
                        <td>
                            <div class="acciones">
                                <form th:action="@{/noticias/{id}/visita(id=${noticia.idNoticia})}" method="post">
                                    <input type="hidden" name="idTema" th:value="${idTema}" />
                                    <button type="submit" class="btn btn-primary">👁 Visitar</button>
                                </form>

                                <form th:action="@{/noticias/{id}/calificar(id=${noticia.idNoticia})}" method="post">
                                    <input type="hidden" name="idTema" th:value="${idTema}" />
                                    <select name="puntuacion" required>
                                    <option value="">Calificar</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                </select>
                                    <button type="submit" class="btn btn-success">★</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>FideNoticias © 2026 · Universidad Fidélitas · SC-504</footer>
</body>

</html>
