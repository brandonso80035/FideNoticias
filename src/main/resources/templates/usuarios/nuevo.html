<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Nuevo Usuario - FideNoticias</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a3a6b; color: white; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; }
        nav .logo { font-size: 1.5rem; font-weight: bold; padding: 1rem 0; }
        nav a { color: #cce0ff; text-decoration: none; padding: 1rem 0.5rem; display: inline-block; }
        main { max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
        .alert-error { background: #f8d7da; color: #721c24; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 1.5rem; }
        .card h2 { color: #1a3a6b; margin-bottom: 1rem; border-bottom: 2px solid #4da6ff; padding-bottom: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
        .form-group input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 0.5rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block; }
        .btn-success { background: #28a745; color: white; }
        .btn-primary { background: #1a3a6b; color: white; }
        footer { text-align: center; padding: 1.5rem; color: #888; font-size: 0.85rem; margin-top: 2rem; }
    </style>
</head>
<body>
<nav>
    <span class="logo">📰 FideNoticias</span>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/noticias/tema/0}">Noticias</a>
    <a th:href="@{/rankings}">Rankings</a>
    <a th:href="@{/usuarios}">Usuarios</a>
</nav>
<main>
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>
    <div class="card">
        <h2>👤 Nuevo Usuario</h2>
        <form th:action="@{/usuarios/crear}" method="post">
            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Brandon Solis"/>
            </div>
            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" required placeholder="brandon@fidelitas.cr"/>
            </div>
            <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                <button type="submit" class="btn btn-success">✔ Crear Usuario</button>
                <a th:href="@{/usuarios}" class="btn btn-primary">← Cancelar</a>
            </div>
        </form>
    </div>
</main>
<footer>FideNoticias © 2026 · Universidad Fidélitas · SC-504</footer>
</body>
</html>
