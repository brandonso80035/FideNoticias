<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Usuarios - FideNoticias</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a3a6b; color: white; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; }
        nav .logo { font-size: 1.5rem; font-weight: bold; padding: 1rem 0; }
        nav a { color: #cce0ff; text-decoration: none; padding: 1rem 0.5rem; display: inline-block; }
        nav a:hover { color: white; border-bottom: 2px solid #4da6ff; }
        main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .alert-success { background: #d4edda; color: #155724; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { color: #1a3a6b; margin-bottom: 1rem; border-bottom: 2px solid #4da6ff; padding-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a3a6b; color: white; padding: 0.75rem; text-align: left; }
        td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f0f7ff; }
        .btn { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; text-decoration: none; display: inline-block; }
        .btn-primary { background: #1a3a6b; color: white; }
        .btn-success { background: #28a745; color: white; }
        .badge-activo   { background: #d4edda; color: #155724; padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.8rem; }
        .badge-inactivo { background: #f8d7da; color: #721c24; padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.8rem; }
        footer { text-align: center; padding: 1.5rem; color: #888; font-size: 0.85rem; margin-top: 2rem; }
    </style>
</head>
<body>
<nav>
    <span class="logo">📰 FideNoticias</span>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/noticias/tema/0}">Noticias</a>
    <a th:href="@{/rankings}">Rankings</a>
    <a th:href="@{/usuarios}">Usuarios</a>
</nav>
<main>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <div class="card">
        <h2>👤 Usuarios registrados
            <a th:href="@{/usuarios/nuevo}" class="btn btn-success" style="float:right;">➕ Nuevo Usuario</a>
        </h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Fecha Registro</th>
                    <th>Estado</th>
                    <th>Reporte</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.idUsuario}"></td>
                    <td th:text="${usuario.nombre}"></td>
                    <td th:text="${usuario.correo}"></td>
                    <td th:text="${usuario.fechaRegistro}"></td>
                    <td>
                        <span th:if="${usuario.activo}"   class="badge-activo">Activo</span>
                        <span th:unless="${usuario.activo}" class="badge-inactivo">Inactivo</span>
                    </td>
                    <td>
                        <a th:href="@{/usuarios/{id}/reporte(id=${usuario.idUsuario})}" class="btn btn-primary">📊 Ver</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<footer>FideNoticias © 2026 · Universidad Fidélitas · SC-504</footer>
</body>
</html>
